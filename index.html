<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manav Dharma — Kalachitra Films</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow-x: hidden;
  }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  /* ---------- Intro Splash ---------- */
  #splash {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: splashOut 0.8s ease forwards;
    animation-delay: 3s;
  }
  #splash img {
    width: min(60vw, 420px);
    animation: logoIn 1s ease forwards;
  }
  @keyframes logoIn {
    0%   { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes splashOut {
    0%   { opacity: 1; visibility: visible; }
    99%  { opacity: 0; visibility: visible; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
  }

  /* ---------- Slides Container ---------- */
  #slides {
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: #000;
    opacity: 0;
    animation: fadeInSite 0.8s ease forwards;
    animation-delay: 3s;
  }
  @keyframes fadeInSite {
    to { opacity: 1; }
  }

  .slide {
    width: 100%;
    display: block;
    line-height: 0;
  }
  .slide img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ---------- Top nav bar ---------- */
  #topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0));
    opacity: 0;
    animation: fadeInSite 0.8s ease forwards;
    animation-delay: 3.2s;
    pointer-events: none;
  }
  #topbar.show { pointer-events: auto; }
  #topbar img {
    height: 42px;
  }
  #topbar span {
    color: #d4af37;
    letter-spacing: 2px;
    font-size: 13px;
    text-transform: uppercase;
    font-family: Georgia, serif;
  }

  /* ---------- Scroll to top ---------- */
  #toTop {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(212,175,55,0.15);
    border: 1px solid #d4af37;
    color: #d4af37;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    z-index: 400;
    opacity: 0;
    transition: opacity 0.3s ease, background 0.2s ease;
  }
  #toTop.visible { opacity: 1; }
  #toTop:hover { background: rgba(212,175,55,0.3); }
</style>
</head>
<body>

  <!-- Intro Logo Splash (shows for 3 seconds) -->
  <div id="splash">
    <img src="assets/logo.png" alt="Kalachitra Films">
  </div>

  <!-- Persistent top bar (fades in after splash) -->
  <div id="topbar">
    <img src="assets/logo.png" alt="Kalachitra Films">
    <span>Manav Dharma · Part I: Prarambha</span>
  </div>

  <!-- Slides, stacked with 2px gap, exactly as the PDF -->
  <div id="slides">
    <div class="slide"><img src="assets/slide_01.jpg" alt="Slide 1 - Title"></div>
    <div class="slide"><img src="assets/slide_02.jpg" alt="Slide 2 - Log Line"></div>
    <div class="slide"><img src="assets/slide_03.jpg" alt="Slide 3 - Synopsis"></div>
    <div class="slide"><img src="assets/slide_04.jpg" alt="Slide 4 - Synopsis Continued"></div>
    <div class="slide"><img src="assets/slide_05.jpg" alt="Slide 5 - Colour Tone"></div>
    <div class="slide"><img src="assets/slide_06.jpg" alt="Slide 6 - Locations"></div>
    <div class="slide"><img src="assets/slide_07.jpg" alt="Slide 7 - Visual Approach"></div>
    <div class="slide"><img src="assets/slide_08.jpg" alt="Slide 8 - Franchise Potential"></div>
    <div class="slide"><img src="assets/slide_09.jpg" alt="Slide 9 - Producer"></div>
    <div class="slide"><img src="assets/slide_10.jpg" alt="Slide 10 - Writer Director"></div>
    <div class="slide"><img src="assets/slide_11.jpg" alt="Slide 11 - Cinematographer"></div>
    <div class="slide"><img src="assets/slide_12.jpg" alt="Slide 12 - Closing Title"></div>
  </div>

  <!-- Back to top button -->
  <div id="toTop" title="Back to top">&#8593;</div>

  <script>
    // Reveal top bar for interaction once splash finishes
    setTimeout(() => {
      document.getElementById('topbar').classList.add('show');
    }, 3800);

    // Scroll-to-top button visibility
    const toTop = document.getElementById('toTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 600) {
        toTop.classList.add('visible');
      } else {
        toTop.classList.remove('visible');
      }
    });
    toTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Prevent scrolling during the 3s splash
    document.body.style.overflow = 'hidden';
    setTimeout(() => {
      document.body.style.overflow = 'auto';
    }, 3000);
  </script>

</body>
</html>
