<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalachitra Films</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000000;
    height: 100%;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    width: 100%;
    height: 72px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  header img {
    height: 44px;
    width: auto;
    display: block;
  }

  /* ---------- Slides ---------- */
  main.slides {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 2px;
    background: #000000;
  }

  main.slides img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ---------- Intro splash ---------- */
  #intro-overlay {
    position: fixed;
    inset: 0;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #intro-overlay img {
    width: 220px;
    max-width: 45vw;
    height: auto;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }

  #intro-overlay.show img {
    opacity: 1;
  }

  #intro-overlay.fade-out {
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  #intro-overlay.hidden {
    display: none;
  }
</style>
</head>
<body>

  <!-- Intro splash logo -->
  <div id="intro-overlay">
    <img src="assets/logo.png" alt="Kalachitra Films">
  </div>

  <!-- Header -->
  <header>
    <img src="assets/logo.png" alt="Kalachitra Films">
  </header>

  <!-- Pitch deck slides -->
  <main class="slides">
    <img src="assets/slides/slide_01.jpg" alt="Slide 1">
    <img src="assets/slides/slide_02.jpg" alt="Slide 2">
    <img src="assets/slides/slide_03.jpg" alt="Slide 3">
    <img src="assets/slides/slide_04.jpg" alt="Slide 4">
    <img src="assets/slides/slide_05.jpg" alt="Slide 5">
    <img src="assets/slides/slide_06.jpg" alt="Slide 6">
    <img src="assets/slides/slide_07.jpg" alt="Slide 7">
    <img src="assets/slides/slide_08.jpg" alt="Slide 8">
    <img src="assets/slides/slide_09.jpg" alt="Slide 9">
    <img src="assets/slides/slide_10.jpg" alt="Slide 10">
    <img src="assets/slides/slide_11.jpg" alt="Slide 11">
    <img src="assets/slides/slide_12.jpg" alt="Slide 12">
    <img src="assets/slides/slide_13.jpg" alt="Slide 13">
    <img src="assets/slides/slide_14.jpg" alt="Slide 14">
    <img src="assets/slides/slide_15.jpg" alt="Slide 15">
    <img src="assets/slides/slide_16.jpg" alt="Slide 16">
    <img src="assets/slides/slide_17.jpg" alt="Slide 17">
    <img src="assets/slides/slide_18.jpg" alt="Slide 18">
    <img src="assets/slides/slide_19.jpg" alt="Slide 19">
  </main>

  <script>
    const overlay = document.getElementById('intro-overlay');

    // Trigger fade-in on next frame
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        overlay.classList.add('show');
      });
    });

    // Hold, then fade out the splash to reveal the site
    setTimeout(() => {
      overlay.classList.add('fade-out');
    }, 2800);

    setTimeout(() => {
      overlay.classList.add('hidden');
    }, 3800);
  </script>

</body>
</html>
